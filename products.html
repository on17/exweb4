<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Bake - เมนูขนม</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-pink-50 text-gray-800 font-sans">

    <div class="max-w-6xl mx-auto px-4 py-12">
        <h2 class="text-3xl font-bold text-center text-pink-700 mb-10">เมนูแนะนำของเรา</h2>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <div class="bg-white rounded-2xl shadow-lg overflow-hidden flex flex-col hover:shadow-xl transition">
                <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=500" alt="Cake" class="h-48 w-full object-cover">
                <div class="p-5 flex flex-col flex-grow">
                    <h3 class="text-xl font-bold mb-2 text-pink-800">เค้กช็อกโกแลตลาวา</h3>
                    <p class="text-gray-600 flex-grow mb-4 text-sm">เค้กช็อกโกแลตเข้มข้น ไส้ลาวาเยิ้มๆ ทานคู่กับไอศกรีม</p>
                    <div class="flex justify-between items-center mt-auto">
                        <span class="text-pink-600 font-bold text-lg">฿120</span>
                        <button class="bg-pink-100 text-pink-700 px-4 py-2 rounded-lg hover:bg-pink-200 transition font-semibold">สั่งซื้อ</button>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-lg overflow-hidden flex flex-col hover:shadow-xl transition">
                <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b?w=500" alt="Donut" class="h-48 w-full object-cover">
                <div class="p-5 flex flex-col flex-grow">
                    <h3 class="text-xl font-bold mb-2 text-pink-800">โดนัทเคลือบสตรอว์เบอร์รี</h3>
                    <p class="text-gray-600 flex-grow mb-4 text-sm">โดนัทแป้งนุ่ม เคลือบน้ำตาลสตรอว์เบอร์รีหอมหวาน</p>
                    <div class="flex justify-between items-center mt-auto">
                        <span class="text-pink-600 font-bold text-lg">฿45</span>
                        <button class="bg-pink-100 text-pink-700 px-4 py-2 rounded-lg hover:bg-pink-200 transition font-semibold">สั่งซื้อ</button>
                    </div>
                </div>
            </div>

            </div>
    </div>

</body>
</html>
