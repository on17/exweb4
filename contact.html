<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Bake - ติดต่อเรา</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-pink-50 text-gray-800 font-sans">

    <div class="max-w-5xl mx-auto px-4 py-12">
        <div class="bg-white rounded-2xl shadow-lg p-8 flex flex-col md:flex-row gap-10">
            
            <div class="flex-1">
                <h2 class="text-3xl font-bold text-pink-700 mb-4">แวะมาเติมความหวาน</h2>
                <p class="text-gray-600 mb-6">ร้านเปิดให้บริการทุกวัน 09:00 - 20:00 น. สามารถสั่งล่วงหน้าได้ผ่านช่องทางด้านล่าง</p>
                <div class="space-y-4 text-gray-700">
                    <p class="flex items-center gap-2">📍 ต.บางเจ้าฉ่า จ.อ่างทอง</p>
                    <p class="flex items-center gap-2">📞 080-123-4567</p>
                    <p class="flex items-center gap-2">📱 LINE: @sweetbake</p>
                </div>
            </div>

            <div class="flex-1 bg-pink-50 p-6 rounded-xl border border-pink-100">
                <h3 class="text-xl font-bold mb-4 text-pink-800">ส่งข้อความหาเรา</h3>
                <form class="flex flex-col gap-4">
                    <input type="text" placeholder="ชื่อของคุณ" class="p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-pink-400">
                    <input type="email" placeholder="อีเมล" class="p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-pink-400">
                    <textarea rows="4" placeholder="ข้อความที่ต้องการส่ง..." class="p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-pink-400"></textarea>
                    <button type="button" class="bg-pink-500 text-white font-bold py-3 rounded-lg hover:bg-pink-600 transition">ส่งข้อความ</button>
                </form>
            </div>

        </div>
    </div>

</body>
</html>
