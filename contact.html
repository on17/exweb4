<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ละมุน ขนมไทย - ติดต่อเรา</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-50 text-gray-800 font-sans">

    <div class="max-w-5xl mx-auto px-4 py-12">
        <div class="bg-white rounded-2xl shadow-lg p-8 flex flex-col md:flex-row gap-10 border border-emerald-100">
            <div class="flex-1">
                <h2 class="text-3xl font-bold text-emerald-800 mb-4">แวะมาลิ้มรสความอร่อย</h2>
                <p class="text-gray-600 mb-6">ร้านเปิดให้บริการทุกวัน 07:00 - 18:00 น. สามารถสั่งทำขนมมงคลล่วงหน้าได้ผ่านช่องทางด้านล่าง</p>
                <div class="space-y-4 text-gray-700">
                    <p class="flex items-center gap-2">📍 ต.บางเจ้าฉ่า จ.อ่างทอง</p>
                    <p class="flex items-center gap-2">📞 080-123-4567</p>
                    <p class="flex items-center gap-2">📱 LINE: @lamunthai</p>
                </div>
            </div>
            <div class="flex-1 bg-emerald-50 p-6 rounded-xl border border-emerald-100">
                <h3 class="text-xl font-bold mb-4 text-emerald-900">สอบถามคิวทำขนม</h3>
                <form class="flex flex-col gap-4">
                    <input type="text" placeholder="ชื่อของคุณ" class="p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-emerald-400">
                    <input type="email" placeholder="เบอร์โทรศัพท์ / ไลน์ไอดี" class="p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-emerald-400">
                    <textarea rows="4" placeholder="ระบุชนิดขนมและจำนวนที่ต้องการสั่ง..." class="p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-emerald-400"></textarea>
                    <button type="button" class="bg-emerald-600 text-white font-bold py-3 rounded-lg hover:bg-emerald-700 transition">ส่งข้อความ</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
